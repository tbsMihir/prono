<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ping Pong Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
        }
        #canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            min-width: 300px;
        }
        #score {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #gameStatus {
            font-size: 20px;
            color: #00ff00;
            margin: 10px 0;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            z-index: 100;
            display: none;
            min-width: 400px;
            border: 3px solid #00ff00;
        }
        #gameOver h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        #gameOver p {
            font-size: 24px;
            margin: 10px 0;
        }
        #gameOver button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #gameOver button:hover {
            background: #00cc00;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            max-width: 400px;
        }
        .control-item {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">You: 0 | AI: 0</div>
        <div id="gameStatus">Game Started</div>
        <div style="font-size: 14px; color: #aaa; margin-top: 10px;">
            <div>Ball Speed: <span id="ballSpeed">0.00</span></div>
            <div>Difficulty: <span id="difficulty">Medium</span></div>
        </div>
    </div>

    <div id="controls">
        <div><strong>Controls:</strong></div>
        <div class="control-item">↑ / ↓ - Move Paddle</div>
        <div class="control-item">W / S - Move Paddle</div>
        <div class="control-item">R - Reset Game</div>
        <div class="control-item">SPACE - Pause/Resume</div>
    </div>

    <div id="gameOver">
        <h1 id="gameOverTitle">Game Over!</h1>
        <p id="gameOverMessage">You Win!</p>
        <p id="gameOverScore">Final Score: 0 - 0</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
